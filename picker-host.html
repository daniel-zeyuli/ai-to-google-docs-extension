<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Choose Drive Folder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    #status {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 13px; color: #777; text-align: center;
      line-height: 1.6; pointer-events: none; z-index: 1;
    }
    #status.error { color: #d93025; }
    /* The sandboxed iframe fills the whole window — Google Picker renders inside it */
    #pickerFrame {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }
    /* Thin footer strip — only visible before picker opens */
    .footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 10px 16px;
      display: flex; justify-content: flex-end;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(4px);
      z-index: 2;
    }
    .btn-cancel {
      padding: 7px 20px; border-radius: 7px;
      font-size: 13px; font-weight: 500;
      cursor: pointer; border: none;
      background: #f1f3f4; color: #555;
    }
    .btn-cancel:hover { background: #e2e5e9; }
  </style>
</head>
<body>
  <div id="status">Loading Google Drive picker…</div>
  <iframe id="pickerFrame" src="picker-sandbox.html"></iframe>
  <div class="footer">
    <button class="btn-cancel" id="btnCancel">Cancel</button>
  </div>
  <script src="picker-host.js"></script>
</body>
</html>
